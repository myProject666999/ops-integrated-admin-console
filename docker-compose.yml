services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/db
    env_file:
      - ./backend/.env
    restart: unless-stopped

volumes:
  backend-data:
